[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/rcs_app/artisan queue:work --sleep=3 --tries=3 --daemon
autostart=true
autorestart=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/rcs_app/storage/logs/worker.log
stopasgroup=true
killasgroup=true
